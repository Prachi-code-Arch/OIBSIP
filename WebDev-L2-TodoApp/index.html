<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App — OIBSIP</title>
  <style>
    * { box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #1e1e2f;
      font-family: 'Segoe UI', Roboto, sans-serif;
      color: #ffffff;
      padding: 20px;
    }
    .card {
      max-width: 560px;
      background: #26263a;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }
    h1 { margin-top: 0; font-size: 1.8rem; }
    p { color: #c8c8d8; line-height: 1.6; }
    img {
      width: 100%;
      border-radius: 10px;
      margin: 20px 0;
      display: block;
    }
    .btn {
      display: inline-block;
      background: #4cd97b;
      color: #1e1e2f;
      font-weight: 700;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 10px;
      margin-top: 10px;
    }
    .btn:hover { background: #5eeb8d; }
    ul { color: #c8c8d8; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>To-Do App</h1>
    <p>An interactive to-do list built with HTML5, CSS3, and vanilla JavaScript.</p>
    <img src="To-do.png" alt="To-Do app screenshot" />
    <h3>Features</h3>
    <ul>
      <li>Add, edit, and delete tasks inline</li>
      <li>Timestamps for each task</li>
      <li><code>localStorage</code> persistence — tasks survive page refresh</li>
    </ul>
    <a class="btn" href="app.html">Launch App →</a>
  </div>
</body>
</html>
